# ---------------------------------------------------
# MySQL connection
# Update the username/password to match your MySQL Workbench login
# ---------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Raji@2980
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------
# JPA / Hibernate
# ddl-auto=update -> Hibernate creates/updates the "products" table
# automatically from the Product entity on startup
# ---------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------
# Server
# ---------------------------------------------------
server.port=8080
